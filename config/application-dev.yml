# 服务器配置
server:
  port: 8080

wx:
  miniapp:
    app-id: your_wx_appid        # 替换为你的小程序 AppID
    app-secret: your_wx_secret   # 替换为你的小程序 AppSecret

cache:
  keyNameSpace: qingwen
  defaultKeyVersion: v1

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://218.244.138.75:3306/fund_valuation_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: admin12345

  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto

  # Redis 配置
  redis:
    # 单机模式
    host: 218.244.138.75
    port: 6379
    password: admin12345     # 如果没有密码就删除这行
    database: 0              # 数据库索引（0-15）
    timeout: 5000            # 连接超时时间（毫秒）
